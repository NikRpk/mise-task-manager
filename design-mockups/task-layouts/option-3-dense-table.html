<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Option 3: Dense Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fffdfa;
      color: #0f172a;
      padding: 40px 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-block;
      color: #009646;
      text-decoration: none;
      margin-bottom: 24px;
      font-size: 14px;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #0f172a;
    }

    .add-btn {
      background: #ff5c00;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:hover {
      background: #e54e00;
    }

    .tasks-card {
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 8px 16px;
    }

    td input[type="text"] {
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 14px;
      font-family: inherit;
      width: 100%;
      transition: all 0.15s;
    }

    td input[type="text"]:hover {
      border-color: #e2e8f0;
      background: white;
    }

    td input[type="text"]:focus {
      outline: none;
      border-color: #009646;
      background: white;
    }

    td input[type="text"]::placeholder {
      color: #94a3b8;
    }

    .owner-select {
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      width: 100%;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .owner-select:hover {
      border-color: #e2e8f0;
      background: white;
    }

    .owner-select:focus {
      outline: none;
      border-color: #009646;
      background: white;
    }

    td input[type="date"] {
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      width: 100%;
      cursor: pointer;
      transition: all 0.15s;
    }

    td input[type="date"]:hover {
      border-color: #e2e8f0;
      background: white;
    }

    td input[type="date"]:focus {
      outline: none;
      border-color: #009646;
      background: white;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 14px;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: #dc2626;
    }

    .add-row {
      border-top: 2px dashed #e2e8f0;
      padding: 12px 16px;
      text-align: center;
      color: #64748b;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .add-row:hover {
      background: #f0fdf4;
      color: #009646;
    }

    @media (max-width: 768px) {
      th, td {
        padding: 8px 12px;
        font-size: 13px;
      }

      th {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back to all options</a>

    <div class="header">
      <h1>TASKS</h1>

          <tbody>

            </tr>
            <tr>
              <td><input type="text" placeholder="Task title..." value="Prepare sprint planning deck"></td>
              <td>
                <select class="owner-select">
                  <option>Max Weber</option>
                </select>
              </td>
              <td><input type="date" value="2026-02-12"></td>
              <td><button class="delete-btn">🗑️</button></td>
            </tr>
            <tr>
              <td><input type="text" placeholder="Task title..." value="Review and merge pending PRs"></td>
              <td>
                <select class="owner-select">
                  <option>Niklas Röpke</option>
                </select>
              </td>
              <td><input type="date" value="2026-02-07"></td>
              <td><button class="delete-btn">🗑️</button></td>
            </tr>
            <tr>
              <td><input type="text" placeholder="Task title..." value="Finalize budget allocation for Q2"></td>
              <td>
                <select class="owner-select">
                  <option>Max Weber</option>
                </select>
              </td>
              <td><input type="date" value="2026-02-20"></td>
              <td><button class="delete-btn">🗑️</button></td>
            </tr>
            <tr>
              <td><input type="text" placeholder="Task title..." value="Conduct user research interviews"></td>
              <td>
                <select class="owner-select">
                  <option>Sarah Schmidt</option>
                </select>
              </td>
              <td><input type="date" value="2026-02-18"></td>
              <td><button class="delete-btn">🗑️</button></td>
            </tr>
            <tr>
              <td><input type="text" placeholder="Task title..." value="Deploy staging environment updates"></td>
              <td>
                <select class="owner-select">
                  <option>Niklas Röpke</option>
                </select>
              </td>
              <td><input type="date" value="2026-02-09"></td>
              <td><button class="delete-btn">🗑️</button></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="add-row">
        + Click here or press Enter to add another task
      </div>
    </div>
  </div>
</body>
</html>
