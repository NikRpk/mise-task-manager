name: Test and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # ─── Job 1: Lint + Tests ─────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Comment test coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─── Job 2: Build check ───────────────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: SKIP_PREBUILD=1 npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SLACK_CHANNEL_NAME: ${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_NAME }}
          NEXT_PUBLIC_SLACK_CHANNEL_URL: ${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_URL }}

  # ─── Job 3: Deploy to STAGING (main push or manual dispatch → staging) ────────
  # Builds Docker image directly on the runner (bypasses Cloud Build source bucket)
  # then pushes to Artifact Registry and deploys to Cloud Run.
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    environment:
      name: staging
      url: https://hf-tasks-staging.web.app

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: europe-west1
      SERVICE_NAME: mise-tasks-staging
      IMAGE_BASE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mise-tasks/mise-tasks-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_APP_URL="https://hf-tasks-staging.web.app" \
            --build-arg SKIP_PREBUILD=1 \
            -t "$IMAGE_BASE:$TAG" \
            -t "$IMAGE_BASE:latest" \
            .
          docker push "$IMAGE_BASE:$TAG"
          docker push "$IMAGE_BASE:latest"
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (staging)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image "$IMAGE_BASE:$IMAGE_TAG" \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --project $PROJECT_ID \
            --set-env-vars "NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1" \
            --update-secrets \
              "GOOGLE_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,\
              GOOGLE_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,\
              GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest,\
              NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest"

      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting (staging target)
        run: |
          firebase target:apply hosting hf-tasks-staging hf-tasks-staging --project $PROJECT_ID
          firebase deploy --only hosting:hf-tasks-staging --project $PROJECT_ID

      - name: Print staging URL
        run: echo "✅ Staging deployed → https://hf-tasks-staging.web.app"

  # ─── Job 4: Deploy to PRODUCTION (manual dispatch → production only) ──────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    environment:
      name: production
      url: https://hf-tasks.web.app

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: europe-west1
      SERVICE_NAME: mise-tasks
      IMAGE_BASE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/mise-tasks/mise-tasks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
            --build-arg SKIP_PREBUILD=1 \
            -t "$IMAGE_BASE:$TAG" \
            -t "$IMAGE_BASE:latest" \
            .
          docker push "$IMAGE_BASE:$TAG"
          docker push "$IMAGE_BASE:latest"
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (production)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image "$IMAGE_BASE:$IMAGE_TAG" \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --project $PROJECT_ID \
            --set-env-vars "NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1" \
            --update-secrets \
              "GOOGLE_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,\
              GOOGLE_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,\
              GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest,\
              NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest"

      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting (production target)
        run: |
          firebase target:apply hosting hf-tasks hf-tasks --project $PROJECT_ID
          firebase deploy --only hosting:hf-tasks --project $PROJECT_ID

      - name: Print production URL
        run: echo "🚀 Production deployed → https://hf-tasks.web.app"
