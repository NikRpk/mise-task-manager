name: Test and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # ─── Job 1: Lint + Tests ─────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Comment test coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─── Job 2: Build check ───────────────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: SKIP_PREBUILD=1 npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SLACK_CHANNEL_NAME: ${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_NAME }}
          NEXT_PUBLIC_SLACK_CHANNEL_URL: ${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_URL }}

  # ─── Job 3: Deploy to STAGING (main push or manual dispatch → staging) ────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build]
    # Run on main pushes OR when manually triggered with target=staging
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    environment:
      name: staging
      url: https://hf-tasks-staging.web.app

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to staging Cloud Run (mise-tasks-staging)
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=europe-west1 \
            --substitutions=_TAG=$TAG,_SERVICE_NAME=mise-tasks-staging,\
          _FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},\
          _FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},\
          _FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},\
          _FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},\
          _FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},\
          _FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }},\
          _APP_URL=https://hf-tasks-staging.web.app,\
          _SLACK_CHANNEL_NAME=${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_NAME }},\
          _SLACK_CHANNEL_URL=${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_URL }}

      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # google-github-actions/auth already exported GOOGLE_APPLICATION_CREDENTIALS —
      # Firebase CLI picks it up automatically via ADC, no FIREBASE_TOKEN needed.
      - name: Deploy Firebase Hosting (staging target)
        run: |
          firebase target:apply hosting hf-tasks-staging hf-tasks-staging --project ${{ secrets.GCP_PROJECT_ID }}
          firebase deploy --only hosting:hf-tasks-staging --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print staging URL
        run: echo "✅ Staging deployed → https://hf-tasks-staging.web.app"

  # ─── Job 4: Deploy to PRODUCTION (manual dispatch → production only) ──────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build]
    # Only runs when manually triggered with target=production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    environment:
      name: production
      url: https://hf-tasks.web.app

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to production Cloud Run (hf-tasks)
        run: |
          TAG=$(date +%Y%m%d-%H%M%S)-${{ github.sha }}
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=europe-west1 \
            --substitutions=_TAG=$TAG,_SERVICE_NAME=mise-tasks,\
          _FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }},\
          _FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }},\
          _FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }},\
          _FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }},\
          _FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }},\
          _FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }},\
          _APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }},\
          _SLACK_CHANNEL_NAME=${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_NAME }},\
          _SLACK_CHANNEL_URL=${{ secrets.NEXT_PUBLIC_SLACK_CHANNEL_URL }}

      - name: Setup Node.js (for Firebase CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting (production target)
        run: |
          firebase target:apply hosting hf-tasks hf-tasks --project ${{ secrets.GCP_PROJECT_ID }}
          firebase deploy --only hosting:hf-tasks --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print production URL
        run: echo "🚀 Production deployed → https://hf-tasks.web.app"
